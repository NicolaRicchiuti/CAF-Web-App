<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Console Admin - CAF UCI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'primary': '#416900' } } } }
    </script>
    
    <!-- Librerie Supabase e SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f8f9fa] font-['Poppins'] text-zinc-900 flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 glass px-8 py-4 flex justify-between items-center shadow-sm border-b border-zinc-100">
        <div class="flex items-center gap-3">
            <img src="logoUci.png" alt="Logo" class="h-8">
            <span class="font-bold text-primary uppercase tracking-tight">Admin Console</span>
        </div>
        <button onclick="eseguiLogout()" class="text-xs font-bold text-red-500 border border-red-100 px-4 py-2 rounded-xl hover:bg-red-50 transition-colors">LOGOUT</button>
    </nav>

    <main class="pt-24 pb-12 px-8 max-w-7xl mx-auto flex-grow w-full">
        <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-zinc-800 tracking-tight">Gestione Appuntamenti</h1>
                <div class="flex items-center gap-2 mt-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
                    </span>
                    <span class="text-[10px] font-bold text-primary uppercase tracking-widest">Live Monitor Attivo</span>
                </div>
            </div>
            
            <button onclick="apriModaleBlocco()" class="bg-white border border-zinc-200 text-zinc-700 px-6 py-3 rounded-2xl font-bold text-sm shadow-sm hover:bg-zinc-50 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-lg text-red-500">block</span>
                Gestisci Chiusure / Ferie
            </button>
        </div>

        <!-- Statistiche -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-center md:text-left">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-100">
                <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1">In Attesa</p>
                <p id="count-pending" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-100">
                <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1">Confermati</p>
                <p id="count-confirmed" class="text-3xl font-bold text-primary">0</p>
            </div>
        </div>

        <!-- NUOVO: Barra di Ricerca e Paginazione -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
            <div class="relative w-full md:w-1/3">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 text-lg">search</span>
                <input type="text" id="search-input" onkeyup="applicaFiltri()" placeholder="Cerca cliente o telefono..." class="w-full bg-white border border-zinc-200 rounded-2xl py-3 pl-12 pr-4 text-sm font-medium text-zinc-700 focus:ring-2 focus:ring-primary outline-none shadow-sm transition-all">
            </div>
            
            <div class="flex items-center gap-3 bg-white border border-zinc-200 rounded-2xl p-2 shadow-sm">
                <button onclick="cambiaPagina(-1)" id="btn-prev" class="p-2 hover:bg-zinc-50 rounded-xl transition-colors disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <span id="page-info" class="text-xs font-bold text-zinc-500 uppercase tracking-widest px-2">Pag 1 / 1</span>
                <button onclick="cambiaPagina(1)" id="btn-next" class="p-2 hover:bg-zinc-50 rounded-xl transition-colors disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </div>
        <!-- Fine blocco ricerca -->

        <!-- Tabella -->
        <div class="bg-white rounded-[32px] shadow-sm border border-zinc-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-zinc-50 border-b border-zinc-100">
                        <tr class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.2em]">
                            <th class="px-8 py-5">Cliente</th>
                            <th class="px-8 py-5">Servizio / Agente</th>
                            <th class="px-8 py-5">Data e Ora</th>
                            <th class="px-8 py-5">Stato</th>
                            <th class="px-8 py-5 text-right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-zinc-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODALE MODIFICA APPUNTAMENTO -->
    <div id="modal-modifica" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-zinc-900/40 backdrop-blur-sm" onclick="chiudiModaleModifica()"></div>
        <div class="relative bg-white w-full max-w-md p-8 rounded-[32px] shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-zinc-800">Modifica Dettagli</h3>
            <input type="hidden" id="edit-app-id">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase">Agente</label>
                    <select id="edit-agent" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100 focus:ring-primary"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase">Data</label>
                        <input type="date" id="edit-date" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase">Ora</label>
                        <input type="time" id="edit-time" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100">
                    </div>
                </div>
            </div>
            <button onclick="salvaModifiche(this)" class="w-full py-4 bg-primary text-white font-bold rounded-2xl mt-8 shadow-lg active:scale-95 transition-all">Salva Modifiche</button>
        </div>
    </div>

    <!-- MODALE GESTIONE BLOCCHI/FERIE -->
    <div id="modal-blocco" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-zinc-900/60 backdrop-blur-sm" onclick="chiudiModaleBlocco()"></div>
        <div class="relative bg-white w-full max-w-md p-8 rounded-[32px] shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-zinc-800">Inserisci Blocco / Ferie</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase">Consulente</label>
                    <select id="block-agent" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100 focus:ring-primary"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase">Data</label>
                    <input type="date" id="block-date" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100">
                </div>
                <div class="flex items-center gap-3 p-4 bg-zinc-50 rounded-2xl">
                    <input type="checkbox" id="block-fullday" onchange="toggleOrariBlocco()" class="w-5 h-5 accent-primary cursor-pointer">
                    <label for="block-fullday" class="text-sm font-bold text-zinc-700 cursor-pointer">Intera Giornata (Ferie)</label>
                </div>
                <div id="block-times-container" class="grid grid-cols-2 gap-4">
                    <input type="time" id="block-start" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100">
                    <input type="time" id="block-end" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 outline-none ring-1 ring-zinc-100">
                </div>
            </div>
            <button onclick="salvaBlocco(this)" class="w-full py-4 bg-zinc-900 text-white font-bold rounded-2xl mt-8 shadow-lg active:scale-95 transition-all">Conferma Blocco</button>
        </div>
    </div>

    <footer class="bg-white border-t border-zinc-100 py-10 px-8 mt-auto text-center">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <img src="logoUci.png" alt="Logo" class="h-6 grayscale opacity-50">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400">&copy; 2024 UCI - Area Riservata Protetta</p>
        </div>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
