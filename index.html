<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>CAF Concierge - Prenota il tuo appuntamento</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#416900">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CAF UCI">
    <link rel="apple-touch-icon" href="logoUci.png">

    <!-- 1. Font di testo: Poppins e Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- 2. Font delle Icone: Google Material Symbols Outlined (URL completa per evitare errori 400) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'primary': '#416900', 'primary-container': '#80c41c', 'background': '#f8f9fa' }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/it.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Script di attivazione Privacy Governance Iubenda -->
    <script type="text/javascript" src="https://embeds.iubenda.com/widgets/1741966e-0149-4917-9294-a30375dd757b.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Centra il calendario su mobile per evitare tagli */
        @media screen and (max-width: 768px) {
            .flatpickr-calendar { left: 50% !important; transform: translateX(-50%) !important; width: 310px !important; margin-top: 10px; }
        }
    </style>
    
</head>
<body class="bg-background font-['Poppins'] text-zinc-900">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="flex justify-between items-center mb-8">
            <img src="logoUci.png" alt="Logo CAF UCI" class="h-12">
            <div class="bg-primary-container text-white w-10 h-10 flex items-center justify-center rounded-full font-bold">US</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <main class="md:col-span-2 space-y-10">
                <!-- 1. I Consulenti -->
                <section>
                    <h1 class="text-2xl font-bold font-['Plus_Jakarta_Sans'] mb-4">1. Scegli il Consulente</h1>
                    <div id="agents-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                </section>

                <!-- 2. I Servizi -->
                <section id="services-section" class="hidden opacity-0 transition-opacity duration-500">
                    <h1 class="text-2xl font-bold font-['Plus_Jakarta_Sans'] mb-4 border-t border-zinc-200 pt-8">2. Seleziona il Servizio</h1>
                    <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                </section>
            </main>

            <!-- Barra Laterale di Prenotazione -->
            <aside class="sidebar-booking flex flex-col gap-8 mt-12 md:mt-0">
                
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-100">
                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest text-center mb-4">Data e Orario</p>
                    <div class="mb-4 relative">
                        <input type="text" id="booking-date" placeholder="Seleziona una data">
                    </div>
                    <div id="slots-container" class="grid grid-cols-2 gap-2 mt-4 hidden"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-100">
                    <h3 class="font-bold text-lg mb-4">Dettagli Appuntamento</h3>
                    <div class="space-y-2 text-sm text-zinc-600 mb-6">
                        <p>Consulente: <span id="summary-agent" class="font-bold text-zinc-900">-</span></p>
                        <p>Servizio: <span id="summary-service" class="font-bold text-zinc-900">-</span></p>
                        <p>Data: <span id="summary-date" class="font-bold text-zinc-900">-</span></p>
                        <p>Ora: <span id="summary-time" class="font-bold text-zinc-900">-</span></p>
                    </div>

                    <!-- Input Utente -->
                    <div class="space-y-3">
                        <input type="text" id="user-name" placeholder="Nome e Cognome" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-primary">
                        <input type="tel" id="user-phone" placeholder="Numero di Telefono" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-primary">
                        <input type="email" id="user-email" placeholder="Email" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-primary">
                    </div>

                    <!-- 🛠️ AGGIUNTA: Casella Spunta Privacy Legale di Iubenda -->
                    <div class="privacy-container" style="margin: 20px 0 10px 0; text-align: left; display: flex; align-items: start; gap: 8px;">
                        <input type="checkbox" id="accetta-privacy" name="privacy" required style="margin-top: 4px; cursor: pointer;">
                        <label for="accetta-privacy" style="font-size: 13px; color: #4b5563; cursor: pointer; user-select: none; line-height: 1.4;">
                            Accetto il trattamento dei dati personali secondo la 
                            <a href="https://www.iubenda.com/privacy-policy/IL_TUO_ID_NUMERICO" class="iubenda-embed" title="Privacy Policy" target="_blank" style="text-decoration: underline; color: #416900; font-weight: bold;">Privacy Policy</a>.
                        </label>
                    </div>

                    <button onclick="confermaPrenotazione()" id="btn-conferma" class="w-full bg-primary text-white font-bold py-4 rounded-2xl mt-4 shadow-lg active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">Conferma Prenotazione</button>
                </div>
            </aside>
        </div>
    </div>

   <!-- FOOTER LEGALE PULITO (Iubenda è gestito dal widget galleggiante) -->
    <footer class="bg-white border-t border-zinc-100 py-10 px-8 mt-auto text-center md:text-left">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            
            <!-- Lato Sinistro: Logo e Copyright (Unico elemento rimasto) -->
            <div class="flex flex-col md:flex-row items-center gap-4 mx-auto md:mx-0">
                <img src="logoUci.png" alt="Logo" class="h-6 grayscale opacity-50">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400">
                    &copy; 2026 UCI - Tutti i diritti riservati 
                </p>
            </div>

        </div>
    </footer>

    <!-- Script di caricamento globale Iubenda -->
    <script type="text/javascript">
        (function (w, d) {
            var loader = function () {
                var s = d.createElement("script"), tag = d.getElementsByTagName("script")[0];
                s.src = "https://cdn.iubenda.com/iubenda.js";
                tag.parentNode.insertBefore(s, tag);
            };
            if (w.addEventListener) { w.addEventListener("load", loader, false); }
            else if (w.attachEvent) { w.attachEvent("onload", loader); }
            else { w.onload = loader; }
        })(window, document);
    </script>
    
    <script src="script.js"></script>
</body>
</html>
