<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Crea Nuova Password - CAF Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'primary': '#416900', 'background': '#f8f9fa' } } } }
    </script>
</head>
<body class="bg-background font-['Poppins'] text-zinc-900 h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md p-10 rounded-[32px] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-headline font-extrabold text-zinc-800">Nuova Password</h1>
            <p class="text-xs text-zinc-500 mt-2">Scegli una nuova password sicura per il tuo account.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-zinc-400 tracking-widest mb-2 uppercase">Nuova Password</label>
                <input type="password" id="new-password" class="w-full bg-zinc-50 border-none rounded-xl py-3 px-4 text-zinc-800 outline-none" placeholder="Minimo 6 caratteri">
            </div>
            
            <button onclick="salvaNuovaPassword()" id="btn-save" class="w-full mt-4 py-4 bg-primary hover:bg-primary/90 text-white font-extrabold rounded-2xl shadow-lg active:scale-95 transition-all">
                Salva e Accedi
            </button>
            <p id="update-error" class="text-red-500 text-xs text-center mt-2 hidden"></p>
        </div>
    </div>

    <script>
        // INSERISCI QUI LE TUE CHIAVI SUPABASE
        const SUPABASE_URL = 'https://vnpzggqebxcqbtwwwefv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZucHpnZ3FlYnhjcWJ0d3d3ZWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MzkyNzYsImV4cCI6MjA4NDQxNTI3Nn0.tYYlfFfvLgF7vMxjMKTF-3Gt1F_XEkB_2A4tL_OeM5Y';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function salvaNuovaPassword() {
            const password = document.getElementById('new-password').value;
            const errorText = document.getElementById('update-error');
            const btn = document.getElementById('btn-save');

            if (password.length < 6) {
                errorText.innerText = "La password deve contenere almeno 6 caratteri.";
                errorText.classList.remove('hidden');
                return;
            }

            btn.innerHTML = 'Salvataggio...';
            errorText.classList.add('hidden');

            // Quando l'utente arriva qui tramite il link via email, Supabase lo ha già 
            // segretamente "loggato" in background usando un token nascosto nell'URL.
            // Quindi possiamo usare direttamente la funzione di aggiornamento utente!
            const { data, error } = await _supabase.auth.updateUser({
                password: password
            });

            if (error) {
                errorText.innerText = "Errore: " + error.message;
                errorText.classList.remove('hidden');
                btn.innerHTML = 'Salva e Accedi';
            } else {
                alert("Password aggiornata con successo! Ora sei dentro.");
                // Password cambiata! Lo mandiamo dritto alla dashboard
                window.location.href = 'admin.html';
            }
        }
    </script>
</body>
</html>
